server:
  address: 127.0.0.1
management:
  endpoint:
    health:
      show-details: never
spring:
  mvc:
    servlet:
      load-on-startup: 1
app:
  cors:
    allowed-origins: ${DOC_WEB_ORIGINS:http://127.0.0.1:5173,http://localhost:5173}
  storage:
    data-directory: ${DOC_CENTRAL_DATA_DIR:}
    documents-directory: ${DOC_CENTRAL_DOCUMENTS_DIR:}
